<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Us - Fluently Academy</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 5%; color: #333; text-align: center; }
        h1 { color: #6a4c93; }
        .contact-box { max-width: 500px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 10px; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #6a4c93; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Contact Fluently Academy</h1>
    <p>Have questions? We’d love to hear from you!</p>
    
    <div class="contact-box">
        <form action="https://formspree.io/f/TU_ID_AQUI" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="_replyto" placeholder="Your Email" required>
            <textarea name="message" placeholder="How can we help you?" rows="5" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <h3>Follow Us</h3>
    <p>
        Instagram: <a href="https://instagram.com/academyfluently">@academyfluently</a><br>
        YouTube: <a href="https://youtube.com/@FluentlyAcademy">@FluentlyAcademy</a>
    </p>
    
    <a href="index.html">Back to Home</a>
</body>
</html>
